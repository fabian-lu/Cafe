[project]
name = "cafe-core"
version = "0.0.1"
description = "CAFE — a design-of-experiments evaluation engine for compound AI systems"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "CAFE authors" }]
keywords = ["evaluation", "llm", "design-of-experiments", "compound-ai"]
dependencies = []

[project.optional-dependencies]
# Stats layer (slice 2) lives behind this extra so the core engine stays light.
stats = ["pandas>=2.0", "numpy>=1.24"]
docs = ["mkdocs-material>=9.5", "mkdocstrings[python]>=0.26"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff>=0.6"]

[project.scripts]
cafe = "cafe.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cafe"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
