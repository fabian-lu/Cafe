site_name: CAFE
site_description: A design-of-experiments platform for evaluating compound AI systems
site_url: https://docs.cafe.dev
repo_url: https://github.com/fabian-lu/Cafe
repo_name: fabian-lu/Cafe
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - toc.follow
  palette:
    # Dark "Factorial Mono" flavour: charcoal canvas, terminal-amber accent.
    - scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts: concepts.md
  - Guides:
      - Define your system: guides/define-a-system.md
  - API reference: reference/api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [packages/cafe-core/src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            heading_level: 2
            members_order: source
            separate_signature: true

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
