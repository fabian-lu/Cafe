# Serves the landing page at / and the read-only SPA demo at /demo.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # long-cache the hashed static assets (js/css/images/fonts)
    location ~* \.(?:js|css|png|jpe?g|gif|svg|ico|woff2?|ttf|eot|npy)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # the demo is a React Router SPA under /demo — deep links fall back to its index.html
    location /demo/ {
        try_files $uri $uri/ /demo/index.html;
    }

    # landing (static, multi-page: index.html + roadmap.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
